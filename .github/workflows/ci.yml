name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  python:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run demo simulation
        run: python scripts/simulate.py

      - name: Run batch experiment
        run: |
          python scripts/run_experiments.py \
            --nodes 3,4,5 \
            --trials 10 \
            --candidate-limit 200 \
            --json results/ci_experiment.json \
            --csv results/ci_experiment.csv

      - name: Run explain trial
        run: |
          python scripts/explain_trial.py \
            --seed 0 \
            --node-count 4 \
            --candidate-limit 100 \
            --output results/ci_explain_trial.md

      - name: Check generated outputs
        run: |
          test -s results/ci_experiment.json
          test -s results/ci_experiment.csv
          test -s results/ci_explain_trial.md

      - name: Run tests
        run: python -m unittest discover -s tests
